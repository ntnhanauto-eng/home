<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart System</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Hiệu ứng gradient chiều sâu */
            background: radial-gradient(circle at center, #2c3e50 0%, #0f171e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Header */
        .header {
            text-align: center;
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 3px;
            padding: 60px 0 40px;
            color: #ffffff;
            text-transform: uppercase;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        /* Grid - Căn giữa và giới hạn chiều rộng */
        .grid {
            display: grid;
            /* Cố định kích thước cột để icon không bị giãn quá xa */
            grid-template-columns: repeat(auto-fit, 120px);
            gap: 40px;
            padding: 20px;
            width: 90%;
            max-width: 1000px; 
            justify-content: center;
        }

        .item {
            text-decoration: none;
            color: white;
            text-align: center;
            transition: all 0.3s ease;
        }

        .icon {
            width: 90px;
            height: 90px;
            border-radius: 22px; /* Bo góc kiểu Apple (Squircle) */
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            overflow: hidden; /* Quan trọng: để ảnh không chờm ra ngoài góc bo */
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .icon img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ảnh sẽ lấp đầy khung hình */
        }

        .label {
            margin-top: 12px;
            font-size: 15px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        /* Hiệu ứng Hover chuyên nghiệp */
        .item:hover .icon {
            transform: translateY(-10px) scale(1.05);
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
        }

        .item:active .icon {
            transform: scale(0.95);
        }

        /* Mobile */
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: repeat(auto-fit, 100px);
                gap: 20px;
            }
            .icon {
                width: 80px;
                height: 80px;
            }
            .header {
                font-size: 22px;
                padding: 40px 0 20px;
            }
        }
    </style>
</head>
<body>

<div class="header">Smart System</div>

<div class="grid">
    <a class="item" href="https://ntnhanauto-eng.github.io/block3dviewer/" target="_blank">
        <div class="icon"><img src="https://github.com/ntnhanauto-eng/home/blob/main/icon3D.png" alt="3D"></div>
        <div class="label">Block 3D</div>
    </a>

    <a class="item" href="https://ntnhanauto-eng.github.io/chamcong/" target="_blank">
        <div class="icon"><img src="https://github.com/ntnhanauto-eng/home/blob/main/chamcong.png" alt="Chấm công"></div>
        <div class="label">Chấm công</div>
    </a>

    <a class="item" href="https://hr.hd-hvs.com/#/v10a2000/" target="_blank">
        <div class="icon"><img src="hr.jpg" alt="Salary"></div>
        <div class="label">Bảng lương</div>
    </a>

    <a class="item" href="https://pp.hd-hvs.com/#/v20Menu/" target="_blank">
        <div class="icon"><img src="pp.jpg" alt="Production"></div>
        <div class="label">Production</div>
    </a>

    <a class="item" href="https://tqm.hd-hvs.com/#/v80Menu/" target="_blank">
        <div class="icon"><img src="tqm.jpg" alt="TQM"></div>
        <div class="label">TQM</div>
    </a>

    <a class="item" href="https://www.windy.com" target="_blank">
        <div class="icon"><img src="windy.jpg" alt="Weather"></div>
        <div class="label">Thời tiết</div>
    </a>
</div>

</body>
</html>
