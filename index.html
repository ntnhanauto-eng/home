<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart System</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
     background-color: #2c3e50; /* nền sậm */
     background-size: cover;

    min-height: 100vh;
}

    /* Header */
    .header {
    text-align: center;
    letter-spacing: 1px;
}
    /* Grid */
    .grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 40px;
        padding: 20px;
    }

    .item {
        text-decoration: none;
        color: white;
        text-align: center;
    }
.icon {
    width: 90px;
    height: 90px;
    border-radius: 20px;
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(10px);

    display: flex;
    align-items: center;
    justify-content: center;
    margin: auto;

    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    transition: 0.3s;
}

    .icon img {
        width: 80px;
        height: 80px;
    }

    .label {
        margin-top: 8px;
        font-size: 16px;
    }

    /* Mobile */
 @media (max-width: 768px) {
    .icon {
        width: 70px;
        height: 70px;
    }

    .icon img {
        width: 60px;
        height: 60px;
    }

    .label {
        font-size: 14px;
    }
}

.icon:hover {
    transform: translateY(-5px) scale(1.05);
    box-shadow: 0 8px 20px rgba(0,0,0,0.5);
}

  
</style>
</head>

<body>

<div class="header">Smart system</div>

<div class="grid">

    <a class="item" href="https://ntnhanauto-eng.github.io/block3dviewer/" target="_blank" rel="noopener noreferrer">
        <div class="icon"><img src="icon3D.png"></div>
        <div class="label">Block 3D</div>
    </a>

    <a class="item" href="https://ntnhanauto-eng.github.io/chamcong/" target="_blank" rel="noopener noreferrer">
        <div class="icon"><img src="hr.jpg"></div>
        <div class="label">Chấm công</div>
    </a>

    <a class="item" href="https://hr.hd-hvs.com/#/v10a2000/" target="_blank" rel="noopener noreferrer">
        <div class="icon"><img src="hr.jpg"></div>
        <div class="label">Bảng lương</div>
    </a>

    <a class="item" href="https://pp.hd-hvs.com/#/v20Menu/" target="_blank" rel="noopener noreferrer">
        <div class="icon"><img src="pp.jpg"></div>
        <div class="label">Production</div>
    </a>

    <a class="item" href="https://tqm.hd-hvs.com/#/v80Menu/" target="_blank" rel="noopener noreferrer">
        <div class="icon"><img src="tqm.jpg"></div>
        <div class="label">TQM</div>
    </a>

    <a class="item" href="https://www.windy.com" target="_blank" rel="noopener noreferrer">
        <div class="icon"><img src="tqm.jpg"></div>
        <div class="label">Thời tiết</div>
    </a>

   

</div>

</body>
</html>
